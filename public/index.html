<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Загублена Земля — Онлайн RPG</title><link rel="stylesheet" href="style.css"/></head><body><div class="app"><header><h1>Загублена Земля</h1><p>Онлайн текстова RPG</p></header><section id="login" class="card"><h2>Вхід у гру</h2><input id="nameInput" placeholder="Введи нік" maxlength="20"/><button onclick="joinGame()">Увійти</button></section><main id="game" class="hidden"><section class="grid"><div class="card"><h2>Персонаж</h2><div id="stats"></div><div class="actions"><button onclick="startFight()">⚔️ Знайти ворога</button><button onclick="attack()">🗡️ Атакувати</button></div></div><div class="card"><h2>Локації</h2><div id="locations"></div></div></section><section class="grid"><div class="card"><h2>Екіпіровка</h2><div id="equipment"></div><button onclick="upgrade('weapon')">🔨 Покращити зброю</button><button onclick="upgrade('armor')">🔨 Покращити броню</button></div><div class="card"><h2>Магазин</h2><button onclick="buy('Зілля лікування')">Купити зілля — 15</button><button onclick="buy('Залізний меч')">Купити меч — 75</button><button onclick="buy('Шкіряна броня')">Купити броню — 30</button></div></section><section class="grid"><div class="card"><h2>Інвентар</h2><div id="inventory"></div></div><div class="card"><h2>Бій / Логи</h2><div id="battleLog"></div></div></section><section class="grid"><div class="card"><h2>Чат</h2><div id="chat"></div><div class="chatRow"><input id="chatInput" placeholder="Повідомлення..."/><button onclick="sendChat()">Надіслати</button></div></div><div class="card"><h2>Онлайн</h2><div id="online"></div></div></section></main></div><script src="/socket.io/socket.io.js"></script><script src="game.js"></script></body></html>
