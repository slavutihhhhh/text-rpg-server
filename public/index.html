<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karavel</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Medieval Sandbox RPG</p>
      <h1>🏰 Каравел</h1>
      <p class="subtitle">Твоє життя. Твоя історія. Світ пам’ятає.</p>
    </header>

    <main class="layout">
      <section class="panel" id="authPanel">
        <h2>Вхід / Реєстрація</h2>
        <input id="loginInput" placeholder="Логін" />
        <input id="passwordInput" type="password" placeholder="Пароль" />
        <div class="actions">
          <button id="loginBtn">Увійти</button>
          <button id="registerBtn">Зареєструватись</button>
        </div>
        <p id="authMessage" class="warn"></p>
      </section>

      <section class="panel hidden" id="startPanel">
        <h2>Створення персонажа</h2>
        <input id="nameInput" placeholder="Імʼя персонажа" />

        <p>Передісторія:</p>
        <select id="backgroundSelect">
          <option value="peasant">Син селянина</option>
          <option value="smith_apprentice">Учень коваля</option>
          <option value="soldier">Колишній солдат</option>
          <option value="thief">Дрібний злодій</option>
          <option value="merchant_kin">Родич купця</option>
        </select>

        <button id="startBtn">Прокинутись у Каравелі</button>
      </section>

      <section class="panel hidden" id="gamePanel">
        <div class="topline">
          <div>
            <h2 id="playerName">Гравець</h2>
            <p id="locationText">Площа Каравела</p>
          </div>
          <div class="actions">
            <button id="saveBtn">💾 Зберегти</button>
            <button id="logoutBtn">🚪 Вийти</button>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat"><span>❤️ Здоровʼя</span><strong id="healthStat"></strong></div>
          <div class="stat"><span>⚡ Енергія</span><strong id="energyStat"></strong></div>
          <div class="stat"><span>💰 Золото</span><strong id="goldStat"></strong></div>
          <div class="stat"><span>⭐ Рівень</span><strong id="levelStat"></strong></div>
          <div class="stat"><span>📘 Досвід</span><strong id="xpStat"></strong></div>
          <div class="stat"><span>👁️ Підозра</span><strong id="suspicionStat"></strong></div>
        </div>

        <div class="scene">
          <p class="scene-place" id="scenePlace"></p>
          <h2 id="sceneTitle"></h2>
          <p id="sceneText"></p>
          <div class="choices" id="choicesBox"></div>
        </div>
      </section>

      <aside class="panel side-panel">
        <h2>🧍 Люди</h2>
        <div id="peopleBox"></div>

        <h2>📦 Стан світу</h2>
        <div id="worldBox"></div>

        <h2>📜 Памʼять світу</h2>
        <div class="log" id="logBox"></div>
      </aside>
    </main>
  </div>

  <script src="./game.js"></script>
</body>
</html>
