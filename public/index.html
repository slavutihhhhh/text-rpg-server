<header>
  <h1>⚔️ Загублена Земля</h1>
  <p>Онлайн RPG</p>
</header>

<section id="login" class="card">
  <h2>Вхід</h2>
  <input id="nameInput" placeholder="Введи нік" />
  <button onclick="joinGame()">Увійти</button>
</section>

<main id="game" class="hidden">

  <div class="grid">

    <div class="card">
      <h2>👤 Персонаж</h2>
      <div id="stats"></div>
      <button onclick="startFight()">⚔️ Бій</button>
      <button onclick="attack()">🗡️ Атака</button>
    </div>

    <div class="card">
      <h2>🌍 Локації</h2>
      <div id="locations"></div>
    </div>

  </div>

  <div class="grid">

    <div class="card">
      <h2>🎒 Інвентар</h2>
      <div id="inventory"></div>
    </div>

    <div class="card">
      <h2>🛡️ Екіпіровка</h2>
      <div id="equipment"></div>
    </div>

  </div>

  <div class="grid">

    <div class="card">
      <h2>📜 Логи бою</h2>
      <div id="battleLog"></div>
    </div>

    <div class="card">
      <h2>💬 Чат</h2>
      <div id="chat"></div>
      <input id="chatInput" placeholder="Написати..." />
      <button onclick="sendChat()">Send</button>
    </div>

  </div>

</main>
